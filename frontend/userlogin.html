<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EF BLOODBANK - User Login / Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root {
    --primary: #dc3545;
    --primary-hover: #b02a37;
    --surface: #ffffff;
    --text: #1f1f1f;
    --shadow: rgba(0, 0, 0, 0.15);
  }

  body {
    background: linear-gradient(135deg, #f8f9fa 0%, #e9edf3 100%);
    font-family: "Google Sans", Roboto, Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .auth-card {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 4px 15px var(--shadow);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    transition: 0.3s ease;
  }

  .auth-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
  }

  h2 {
    color: var(--primary);
    font-weight: 700;
    text-align: center;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  .form-label { font-weight: 500; }
  .form-control {
    border-radius: 8px;
    padding: 0.7rem;
    border: 1px solid #ccc;
  }
  .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 0.2rem rgba(220,53,69,0.25);
  }

  .btn-auth {
    background-color: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.7rem;
    font-weight: 600;
    transition: 0.3s;
  }
  .btn-auth:hover { background-color: var(--primary-hover); }

  .toggle-link {
    margin-top: 1rem;
    font-size: 0.9rem;
    text-align: center;
  }
  .toggle-link a {
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .toggle-link a:hover { text-decoration: underline; }

  .error-msg {
    color: #b3261e;
    display: none;
    text-align: center;
    font-weight: 500;
    margin-top: 10px;
  }

  footer {
    position: absolute;
    bottom: 15px;
    font-size: 0.85rem;
    color: #777;
  }
</style>
</head>
<body>

<div class="auth-card">
  <h2 id="formTitle">User Login</h2>

  <!-- Login Form -->
  <form id="loginForm">
    <div class="mb-3 text-start">
      <label for="loginEmail" class="form-label">Email</label>
      <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
    </div>
    <div class="mb-3 text-start">
      <label for="loginPassword" class="form-label">Password</label>
      <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn btn-auth w-100">Login</button>
    <p id="loginError" class="error-msg">Invalid email or password!</p>
  </form>

  <!-- Signup Form -->
  <form id="signupForm" style="display:none;">
    <div class="mb-3 text-start">
      <label for="signupName" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="signupName" placeholder="Enter full name" required>
    </div>
    <div class="mb-3 text-start">
      <label for="signupEmail" class="form-label">Email</label>
      <input type="email" class="form-control" id="signupEmail" placeholder="Enter email" required>
    </div>
    <div class="mb-3 text-start">
      <label for="signupPassword" class="form-label">Password</label>
      <input type="password" class="form-control" id="signupPassword" placeholder="Create password" required>
    </div>
    <button type="submit" class="btn btn-auth w-100">Sign Up</button>
    <p id="signupSuccess" class="error-msg" style="color:green; display:none;">✅ Account created! You can now log in.</p>
  </form>

  <div class="toggle-link">
    <span id="toggleText">Don’t have an account? <a id="toggleForm">Sign Up</a></span>
  </div>
</div>

<footer>© 2025 EF BLOODBANK | User Access</footer>

<script>
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
const toggleForm = document.getElementById('toggleForm');
const formTitle = document.getElementById('formTitle');
const toggleText = document.getElementById('toggleText');
const loginError = document.getElementById('loginError');
const signupSuccess = document.getElementById('signupSuccess');

// Temporary local storage system (demo purpose)
let users = JSON.parse(localStorage.getItem('ef_users')) || [];

// Toggle between login and signup
toggleForm.addEventListener('click', () => {
  const isLogin = loginForm.style.display !== 'none';
  if (isLogin) {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    formTitle.innerText = 'User Sign Up';
    toggleText.innerHTML = 'Already have an account? <a id="toggleForm">Login</a>';
  } else {
    signupForm.style.display = 'none';
    loginForm.style.display = 'block';
    formTitle.innerText = 'User Login';
    toggleText.innerHTML = 'Don’t have an account? <a id="toggleForm">Sign Up</a>';
  }
});

// Handle Signup
signupForm.addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value.trim();

  const exists = users.find(u => u.email === email);
  if (exists) {
    alert('Account already exists. Please login.');
    return;
  }

  users.push({ name, email, password });
  localStorage.setItem('ef_users', JSON.stringify(users));
  signupSuccess.style.display = 'block';
  signupForm.reset();

  setTimeout(() => {
    signupSuccess.style.display = 'none';
    signupForm.style.display = 'none';
    loginForm.style.display = 'block';
    formTitle.innerText = 'User Login';
  }, 1500);
});

// Handle Login
loginForm.addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  const user = users.find(u => u.email === email && u.password === password);
  if (user) {
    // ✅ Redirect to user donor page
    window.location.href = 'user.html';
  } else {
    loginError.style.display = 'block';
  }
});
</script>
</body>
</html>
