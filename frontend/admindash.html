<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EF BLOODBANK - Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root {
    --gm3-sys-color-primary: rgb(220, 53, 69); /* EF Red */
    --gm3-sys-color-on-primary: rgb(255, 255, 255);
    --gm3-sys-color-surface: rgb(255, 255, 255);
    --gm3-sys-color-surface-container: rgb(240, 244, 249);
    --gm3-sys-color-outline: rgb(196, 199, 197);
    --gm3-sys-color-on-surface: rgb(31, 31, 31);
    --gm3-sys-color-shadow: rgba(0, 0, 0, 0.2);
    --wf-color-gradient-start: rgba(233,238,246,0);
  }

  body {
    background: linear-gradient(135deg, #f8f9fa 0%, #e9edf3 100%);
    font-family: "Google Sans", Roboto, "Noto Sans Myanmar UI", Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--gm3-sys-color-on-surface);
  }

  .login-card {
    background: var(--gm3-sys-color-surface);
    border-radius: 18px;
    box-shadow: 0 4px 15px var(--gm3-sys-color-shadow);
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .login-card:hover {
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.25);
    transform: translateY(-3px);
  }

  .login-card h2 {
    color: var(--gm3-sys-color-primary);
    font-weight: 700;
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-label {
    font-weight: 500;
    color: var(--gm3-sys-color-on-surface);
  }

  .form-control {
    border: 1px solid var(--gm3-sys-color-outline);
    border-radius: 8px;
    padding: 0.75rem;
  }

  .form-control:focus {
    border-color: var(--gm3-sys-color-primary);
    box-shadow: 0 0 0 0.2rem rgba(220,53,69,0.25);
  }

  .btn-login {
    background-color: var(--gm3-sys-color-primary);
    color: var(--gm3-sys-color-on-primary);
    border: none;
    border-radius: 8px;
    padding: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: background 0.3s ease;
  }

  .btn-login:hover {
    background-color: #b02a37;
  }

  .error-msg {
    color: var(--gm3-sys-color-error, #b3261e);
    margin-top: 10px;
    display: none;
    font-size: 0.9rem;
    font-weight: 500;
  }

  footer {
    position: absolute;
    bottom: 15px;
    font-size: 0.85rem;
    color: #777;
  }
</style>
</head>
<body>

<div class="login-card">
  <h2>EF BLOODBANK Admin Login</h2>
  <form id="loginForm">
    <div class="mb-3 text-start">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Enter username" required>
    </div>
    <div class="mb-3 text-start">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn btn-login w-100">Login</button>
    <p id="errorMsg" class="error-msg">Invalid username or password!</p>
  </form>
</div>

<footer>© 2025 EF BLOODBANK | Admin Access</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  if (username === 'admin' && password === 'admin123') {
    // ✅ Redirect to your dashboard file (index.html)
    window.location.href = 'index.html';
  } else {
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
